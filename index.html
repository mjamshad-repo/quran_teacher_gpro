<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tajweed AI Assistant - Malayalam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; background-color: #f0f4f8; }
        .quran-text { font-family: 'Amiri', serif; direction: rtl; }
        .mic-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-emerald-800">തജ്‌വീദ് അസിസ്റ്റന്റ്</h1>
            <p class="text-gray-600">മലയാളത്തിൽ ചോദ്യങ്ങൾ ചോദിക്കുക</p>
        </header>

        <!-- Mic Button Area -->
        <div class="flex flex-col items-center justify-center bg-white rounded-2xl shadow-lg p-8 mb-6">
            <button id="micBtn" class="w-24 h-24 bg-emerald-600 text-white rounded-full flex items-center justify-center shadow-xl transition-all hover:bg-emerald-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
            <p id="statusTxt" class="mt-4 text-emerald-700 font-medium">ചോദിക്കാൻ ബട്ടൺ അമർത്തുക</p>
            <div id="transcriptArea" class="mt-2 text-sm text-gray-500 italic min-h-[1.5rem]"></div>
        </div>

        <!-- Result Area -->
        <div id="resultCard" class="hidden bg-white rounded-xl shadow-md p-6 border-l-4 border-emerald-500">
            <div id="answerContent">
                <!-- Dynamic Content Here -->
            </div>
            <button onclick="resetApp()" class="mt-6 text-sm text-emerald-600 font-bold border border-emerald-600 px-4 py-2 rounded-lg hover:bg-emerald-50">മറ്റൊരു ചോദ്യം ചോദിക്കാം</button>
        </div>

        <!-- Instructions -->
        <div class="mt-8 bg-emerald-50 p-4 rounded-lg text-sm text-emerald-900">
            <h3 class="font-bold mb-2">ഇങ്ങനെ ചോദിച്ചു നോക്കൂ:</h3>
            <ul class="list-disc ml-5 space-y-1">
                <li>"സൂറത്ത് അൽ കഹ്ഫിൽ എത്ര ഇദ്‌ഗാം ഉണ്ട്?"</li>
                <li>"സൂറത്ത് ഇഖ്‌ലാസിലെ ഇഖ്ഫാ നിയമങ്ങൾ പറയുക"</li>
            </ul>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION & DATA ---
        const surahMapping = {
            "ഫാത്തിഹ": 1, "ബഖറ": 2, "കഹ്ഫ്": 18, "ഇഖ്‌ലാസ്": 112, "ഫലഖ്": 113, "നാസ്": 114, "യാസീൻ": 36, "മുൽക്": 67
            // Add more common names here or use a fuzzy search for better coverage
        };

        const tajweedRules = {
            "ഇദ്‌ഗാം": {
                name: "Idgham (ഇദ്‌ഗാം)",
                regex: /([\u064B\u064C\u064D\u0646\u0652])\s*[\u064A\u0631\u0645\u0644\u0648\u0646]/g,
                explanation: "നൂൺ സാകിനയോ തൻവീനോ വന്നതിന് ശേഷം യ, റ, മ, ല, വ, ന എന്നീ അക്ഷരങ്ങൾ വന്നാൽ ഇദ്‌ഗാം നിയമം ബാധകമാണ്."
            },
            "ഇഖ്ഫാ": {
                name: "Ikhfa (ഇഖ്ഫാ)",
                regex: /([\u064B\u064C\u064D\u0646\u0652])\s*[\u062a\u062b\u062c\u062f\u0630\u0632\u0633\u0634\u0635\u0636\u0637\u0638\u0641\u0642\u064a]/g,
                explanation: "നൂൺ സാകിനയോ തൻവീനോ വന്നതിന് ശേഷം ഇഖ്ഫാഇന്റെ 15 അക്ഷരങ്ങളിൽ ഒന്ന് വന്നാൽ അവിടെ ശബ്ദം മറച്ചു വെച്ച് ഉച്ചരിക്കണം."
            },
            "ഇഖ്‌ലാബ്": {
                name: "Iqlab (ഇഖ്‌ലാബ്)",
                regex: /([\u064B\u064C\u064D\u0646\u0652])\s*[\u0628]/g,
                explanation: "നൂൺ സാകിനയോ തൻവീനോ വന്നതിന് ശേഷം 'ബാ' എന്ന അക്ഷരം വന്നാൽ മീം ആയി മാറ്റി ഉച്ചരിക്കണം."
            }
        };

        // --- 2. SPEECH RECOGNITION ---
        const micBtn = document.getElementById('micBtn');
        const statusTxt = document.getElementById('statusTxt');
        const transcriptArea = document.getElementById('transcriptArea');
        const resultCard = document.getElementById('resultCard');
        const answerContent = document.getElementById('answerContent');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("നിങ്ങളുടെ ബ്രൗസർ വോയിസ് സെർച്ച് പിന്തുണയ്ക്കുന്നില്ല. ദയവായി ക്രോം ഉപയോഗിക്കുക.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'ml-IN';
        recognition.interimResults = false;

        micBtn.onclick = () => {
            recognition.start();
            micBtn.classList.add('mic-active');
            statusTxt.innerText = "ശ്രദ്ധിക്കുന്നു...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            transcriptArea.innerText = `നിങ്ങൾ ചോദിച്ചത്: "${transcript}"`;
            micBtn.classList.remove('mic-active');
            processQuestion(transcript);
        };

        recognition.onerror = () => {
            micBtn.classList.remove('mic-active');
            statusTxt.innerText = "ക്ഷമിക്കണം, ഒന്നും കേട്ടില്ല.";
        };

        // --- 3. LOGIC ENGINE ---
        async function processQuestion(text) {
            statusTxt.innerText = "പരിശോധിക്കുന്നു...";
            
            // Identify Surah
            let surahId = null;
            for (let key in surahMapping) {
                if (text.includes(key)) { surahId = surahMapping[key]; break; }
            }

            // Identify Rule
            let ruleKey = null;
            for (let key in tajweedRules) {
                if (text.includes(key)) { ruleKey = key; break; }
            }

            if (!surahId || !ruleKey) {
                showError("ക്ഷമിക്കണം, സൂറത്തോ തജ്‌വീദ് നിയമമോ വ്യക്തമല്ല. 'സൂറത്ത് കഹ്ഫിലെ ഇദ്‌ഗാം' എന്ന് ചോദിച്ചു നോക്കൂ.");
                return;
            }

            fetchTajweedData(surahId, ruleKey);
        }

        async function fetchTajweedData(surahId, ruleKey) {
            try {
                // Fetching Uthmani Text from API
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${surahId}/quran-uthmani`);
                const data = await response.json();
                const ayahs = data.data.ayahs;
                const rule = tajweedRules[ruleKey];
                
                let matches = [];

                ayahs.forEach(ayah => {
                    if (ayah.text.match(rule.regex)) {
                        matches.push({
                            numberInSurah: ayah.numberInSurah,
                            text: ayah.text
                        });
                    }
                });

                displayResult(ruleKey, matches, rule.explanation, data.data.name);
            } catch (err) {
                showError("ഡാറ്റ ലഭ്യമാക്കുന്നതിൽ തടസ്സം നേരിട്ടു.");
            }
        }

        function displayResult(ruleName, matches, explanation, surahNameArabic) {
            statusTxt.innerText = "ഉത്തരം തയ്യാർ!";
            resultCard.classList.remove('hidden');
            
            let ayahListHtml = matches.slice(0, 5).map(m => `
                <div class="mb-4 p-3 bg-gray-50 rounded">
                    <p class="quran-text text-xl mb-1">${m.text}</p>
                    <span class="text-xs font-bold text-emerald-600">ആയത്ത്: ${m.numberInSurah}</span>
                </div>
            `).join('');

            answerContent.innerHTML = `
                <h2 class="text-xl font-bold text-emerald-800 mb-2">${ruleName} എണ്ണം: ${matches.length}</h2>
                <p class="text-gray-600 text-sm mb-4">സൂറത്ത്: ${surahNameArabic}</p>
                
                <div class="mb-4">
                    <h3 class="font-bold text-gray-700">വ്യാഖ്യാനം:</h3>
                    <p class="text-gray-600">${explanation}</p>
                </div>

                <div class="mt-4">
                    <h3 class="font-bold text-gray-700 mb-2">ഉദാഹരണങ്ങൾ:</h3>
                    ${ayahListHtml}
                    ${matches.length > 5 ? '<p class="text-xs text-gray-400">കൂടുതൽ ആയത്തുകൾ ഉണ്ട്...</p>' : ''}
                </div>
            `;
        }

        function showError(msg) {
            statusTxt.innerText = "അഭ്യർത്ഥന പരാജയപ്പെട്ടു";
            resultCard.classList.remove('hidden');
            answerContent.innerHTML = `<p class="text-red-500">${msg}</p>`;
        }

        function resetApp() {
            resultCard.classList.add('hidden');
            transcriptArea.innerText = "";
            statusTxt.innerText = "ചോദിക്കാൻ ബട്ടൺ അമർത്തുക";
        }
    </script>
</body>
</html>
